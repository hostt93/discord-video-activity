<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Video Player Activity</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, sans-serif;
    }
    #bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      gap: 6px;
      padding: 8px;
      background: rgba(0, 0, 0, 0.75);
    }
    #url-input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #444;
      background: #111;
      color: #eee;
      font-size: 14px;
    }
    #load-btn {
      padding: 8px 14px;
      border-radius: 6px;
      border: 0;
      background: #5865f2;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    #load-btn:hover {
      background: #4752c4;
    }
    #player {
      border: 0;
      width: 100vw;
      height: 100vh;
      display: block;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="bar">
    <input id="url-input" type="text" placeholder="Paste an embed link or <iframe> code here, then press Load" />
    <button id="load-btn">Load</button>
  </div>
  <iframe id="player" allowfullscreen="true" frameborder="0" scrolling="1"></iframe>
  <script type="module" src="/main.js"></script>
</body>
</html>
